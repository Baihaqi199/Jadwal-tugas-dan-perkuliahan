<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager & Calendar</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#f4f1ea] p-4 md:p-8 font-mono text-slate-800 custom-bg">
    <audio id="audioElement" loop></audio>

    <div class="max-w-7xl mx-auto">
        <!-- Tabs -->
        <div class="flex gap-2 mb-0 translate-y-1">
            <button id="tabTasks" class="flex items-center gap-2 px-6 py-3 rounded-t-2xl font-black text-xs transition-all border-x border-t bg-white border-slate-300 text-blue-600">
                <i data-lucide="pencil" class="w-4 h-4"></i> TUGAS.TXT
            </button>
            <button id="tabSchedules" class="flex items-center gap-2 px-6 py-3 rounded-t-2xl font-black text-xs transition-all border-x border-t bg-slate-200/50 border-transparent text-slate-400">
                <i data-lucide="graduation-cap" class="w-4 h-4"></i> KULIAH.LOG
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 bg-white border border-slate-300 shadow-2xl rounded-tr-3xl rounded-b-3xl p-6">
            
            <!-- Kolom Kiri: Sidebar Input -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-slate-50 rounded-2xl p-6 border-2 border-dashed border-slate-200 relative overflow-hidden">
                    <!-- Decorative Hole Punch -->
                    <div class="absolute left-2 top-0 bottom-0 flex flex-col justify-around py-4 opacity-20">
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                        <div class="w-4 h-4 rounded-full bg-slate-400 shadow-inner"></div>
                    </div>

                    <div class="flex items-center justify-between mb-6 pl-4">
                        <h2 id="formTitle" class="text-lg font-black tracking-tighter uppercase italic flex items-center gap-2">
                            <i data-lucide="sticky-note" class="text-yellow-500 w-5 h-5"></i> Daftar Tugas
                        </h2>
                        <div class="flex gap-2">
                            <button id="btnMute" class="p-1.5 rounded-lg border-2 border-blue-200 text-blue-400">
                                <i data-lucide="volume-2" class="w-4 h-4" id="muteIcon"></i>
                            </button>
                        </div>
                    </div>

                    <form id="mainForm" class="space-y-4 pl-4">
                        <input type="text" id="itemName" placeholder="Tulis tugas baru..." required
                            class="w-full px-4 py-3 rounded-xl bg-white border-2 border-slate-100 text-sm font-bold focus:border-blue-400 outline-none placeholder:text-slate-300" />

                        <div class="grid grid-cols-3 gap-2">
                            <select id="selectDay" class="bg-white border-2 border-slate-100 rounded-xl text-[10px] py-2 font-bold px-1 outline-none focus:border-blue-400"></select>
                            <select id="selectMonth" class="bg-white border-2 border-slate-100 rounded-xl text-[10px] py-2 font-bold px-1 outline-none focus:border-blue-400"></select>
                            <select id="selectYear" class="bg-white border-2 border-slate-100 rounded-xl text-[10px] py-2 font-bold px-1 outline-none focus:border-blue-400"></select>
                        </div>

                        <div class="flex gap-2">
                            <div class="flex-1">
                                <label class="text-[9px] font-black text-slate-400 block mb-1">JAM_MULAI</label>
                                <input type="time" id="itemTime" value="12:00" required class="w-full bg-white border-2 border-slate-100 rounded-xl py-2 px-2 text-xs font-bold" />
                            </div>
                            <div class="flex-1">
                                <label id="secondaryLabel" class="text-[9px] font-black text-slate-400 block mb-1 uppercase">Prioritas</label>
                                
                                <select id="itemPriority" class="w-full bg-white border-2 border-slate-100 rounded-xl py-2 px-2 text-xs font-bold">
                                    <option value="High">Tinggi</option>
                                    <option value="Medium">Sedang</option>
                                    <option value="Low">Rendah</option>
                                </select>
                                
                                <input type="text" id="itemRoom" placeholder="R.101" class="hidden w-full bg-white border-2 border-slate-100 rounded-xl py-2 px-2 text-xs font-bold" />
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg transition-all active:scale-95 bg-blue-600 text-white">
                            + SIMPAN_DATA
                        </button>
                    </form>
                </div>

                <!-- List Detail Harian -->
                <div class="bg-amber-50/50 rounded-2xl p-6 border-2 border-amber-100 min-h-[250px]">
                    <h3 class="font-black text-slate-500 mb-4 text-[10px] flex items-center gap-2">
                        <i data-lucide="calendar" class="w-4 h-4"></i> AGENDA: <span id="agendaDateText"></span>
                    </h3>
                    <div id="agendaList" class="space-y-2">
                        <!-- Agenda items will be injected here -->
                    </div>
                </div>
            </div>

            <!-- Kolom Kanan: Kalender -->
            <div class="lg:col-span-8">
                <div class="h-full flex flex-col">
                    <div class="flex items-center justify-between mb-4 bg-slate-800 text-white p-4 rounded-2xl shadow-xl">
                        <div class="flex items-center gap-4">
                            <div class="bg-blue-500 p-2 rounded-xl"><i data-lucide="calendar" class="w-5 h-5"></i></div>
                            <div>
                                <h2 id="calendarMonth" class="text-lg font-black tracking-tight leading-none">Bulan</h2>
                                <p id="calendarYear" class="text-[10px] font-bold opacity-60 uppercase">Tahun // ACADEMIC_YEAR</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button id="btnPrevMonth" class="p-2 hover:bg-slate-700 rounded-xl transition-colors"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <button id="btnToday" class="px-4 text-[10px] font-black uppercase tracking-tighter">Hari Ini</button>
                            <button id="btnNextMonth" class="p-2 hover:bg-slate-700 rounded-xl transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                    </div>

                    <div class="flex-1 border-2 border-slate-200 rounded-3xl overflow-hidden bg-slate-50 shadow-inner">
                        <div class="grid grid-cols-7 text-center font-black text-[9px] text-slate-400 uppercase py-4 border-b-2 border-slate-100 bg-white">
                            <div>Ming</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                        </div>
                        <div id="calendarGrid" class="grid grid-cols-7 bg-slate-200 gap-[1px]">
                            <!-- Calendar days will be injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alarm Modal -->
    <div id="alarmModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-[0_20px_50px_rgba(0,0,0,0.3)] border-4 border-slate-800 relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-2 bg-yellow-400"></div>
            <div class="bg-red-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 border-4 border-red-100 animate-pulse">
                <i data-lucide="bell" class="text-red-500 w-10 h-10"></i>
            </div>
            <h2 id="alarmLabel" class="text-xl font-black text-slate-800 mb-2 uppercase tracking-tighter italic">🔔 ALARM</h2>
            <div class="bg-slate-100 p-4 rounded-2xl mb-6">
                <p id="alarmName" class="text-blue-600 font-black text-lg">"Nama Tugas"</p>
                <p id="alarmRoom" class="text-[10px] font-bold text-slate-400 mt-2 hidden">LOKASI: RUANG </p>
            </div>
            <button id="btnStopAlarm" class="w-full bg-slate-800 text-white font-black py-4 rounded-xl uppercase tracking-widest text-[10px] shadow-lg active:scale-95">MATIKAN BEL</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
